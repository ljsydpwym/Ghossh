name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to build from (must exist)"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build native JNI library
        run: |
          nix develop -c bash -c '
            set -e
            cd zig-src
            zig build -Doptimize=ReleaseSmall jni
          '

      - name: Generate release key
        run: |
          mkdir -p android/app/keystore
          cd android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ghossh-key.jks
          ls -la ghossh-key.jks

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          nix develop -c bash -c '
            set -e
            cd android
            chmod +x ./gradlew
            ./gradlew assembleRelease
          '

      - name: Upload release APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: true
          files: |
            android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
